[plugin]
id = "com.revdeck.examples.valid-minimal"
name = "Valid Minimal Plugin"
version = "0.1.0"
sdk_version = "0.1.0"
revdeck_compat = ">=0.1,<0.3"

[[capabilities]]
id = "minimal-adapter"
kind = "adapter"
inputs = ["json"]
outputs = ["object_batch"]

[permissions]
artifact_read = ["external_export"]
project_write = ["objects", "edges", "attributes", "diagnostics"]
network = false
process_spawn = false
secrets = false
environment = false

[ui]
commands = ["minimal.import"]
inspector_cards = ["minimal.provenance"]
